name: stohr
description: Stohr — cloud storage for iOS and Android.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # networking
  dio: ^5.7.0
  http_parser: ^4.1.0

  # state / routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.1

  # storage
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.5

  # media
  file_picker: ^8.1.4
  image_picker: ^1.1.2
  share_plus: ^10.1.2
  url_launcher: ^6.3.1

  # preview
  video_player: ^2.9.2
  chewie: ^1.8.5
  just_audio: ^0.9.42
  pdfx: ^2.8.0
  cached_network_image: ^3.4.1

  # icons
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
