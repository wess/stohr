services:
  postgres:
    # pgvector/pgvector:pg16 ships pgvector preinstalled. Stohr's
    # 00000038_file_embeddings migration runs CREATE EXTENSION vector
    # at boot; without this image the API would fail on first start
    # whenever AI_EMBED_MODEL is set. The plain postgres:16-alpine
    # image works for non-AI deployments but you'd lose semantic search.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: stohr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stohr"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: bun src/server.ts
    environment:
      PORT: "3000"
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/stohr
      SECRET: ${SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      APP_URL: ${APP_URL:-http://localhost:3001}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-Stohr <onboarding@resend.dev>}
      RP_ID: ${RP_ID:-localhost}
      RP_NAME: ${RP_NAME:-Stohr}
      RP_ORIGIN: ${RP_ORIGIN:-http://localhost:3001}
      # Trust X-Forwarded-For only when the request enters from the docker
      # bridge — i.e. from the `web` service. Anything outside this range
      # cannot pin or spoof rate-limit buckets. Compose default networks live
      # in 172.16.0.0/12.
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-172.16.0.0/12}
      # RAM ceiling per concurrent upload (Bun + SigV4 hashing both buffer).
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-1073741824}
      # AI / semantic search. Leave empty to disable; the API boots fine
      # without it. Set to a bai preset id (e.g. nomic-embed-text-v1.5)
      # AND pull the model into the baimodels volume first:
      #   docker compose run --rm api bunx bai pull nomic-embed-text-v1.5
      AI_EMBED_MODEL: ${AI_EMBED_MODEL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JOBS_TICK_MS: ${JOBS_TICK_MS:-2000}
      TRASH_RETENTION_DAYS: ${TRASH_RETENTION_DAYS:-30}
    volumes:
      # Persisted model cache for bai. Survives `docker compose down -v`
      # only if you preserve the named volume; otherwise run `bai pull`
      # again. Models are large enough (100s of MB) that we don't bake
      # them into the image.
      - baimodels:/root/.cache/bai/models
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: bun src/web/serve.ts
    environment:
      WEB_PORT: "3001"
      API_URL: http://api:3000
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - web
    restart: unless-stopped

volumes:
  pgdata:
  caddydata:
  caddyconfig:
  baimodels:
