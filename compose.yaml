services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stohr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stohr"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: dockerfile
    command: bun src/server.ts
    environment:
      PORT: "3000"
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/stohr
      SECRET: ${SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: dockerfile
    command: bun src/web/serve.ts
    environment:
      WEB_PORT: "3001"
      API_URL: http://api:3000
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - web
    restart: unless-stopped

volumes:
  pgdata:
  caddydata:
  caddyconfig:
