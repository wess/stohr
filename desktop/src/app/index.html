<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stohr</title>
  <link rel="stylesheet" href="butter://styles.css">
</head>
<body>
  <main id="root">
    <header>
      <h1>Stohr</h1>
      <p id="status" class="muted">Loading…</p>
    </header>

    <section id="signed-out" hidden>
      <p>Sign in to your Stohr instance to start capturing screenshots.</p>
      <label>Server URL
        <input id="server-url" type="url" placeholder="https://stohr.example.com/api" autocapitalize="off" autocorrect="off">
      </label>
      <label>Client ID
        <input id="client-id" type="text" placeholder="cli_…" autocapitalize="off" autocorrect="off">
        <small>Get this from <strong>Settings → Developer → OAuth applications</strong> on your Stohr instance.</small>
      </label>
      <button id="sign-in-btn" class="primary">Sign in via browser</button>
      <p class="hint">Your browser will open the Stohr authorize page. After approving, the app will receive the redirect.</p>
    </section>

    <section id="signed-in" hidden>
      <p class="account">
        Signed in as <strong id="who"></strong>
        <button id="sign-out-btn" class="link">Sign out</button>
      </p>

      <div class="actions">
        <button data-mode="region" class="primary">Capture region</button>
        <button data-mode="window">Capture window</button>
        <button data-mode="screen">Capture full screen</button>
      </div>
      <p class="hint">Or hit <kbd>⌘</kbd>+<kbd>⇧</kbd>+<kbd>8</kbd> from anywhere.</p>

      <h2>Recent captures</h2>
      <ol id="recents" class="recents">
        <li class="empty muted">Nothing yet — your screenshots will appear here.</li>
      </ol>
    </section>

    <p id="msg" class="msg" hidden></p>
  </main>

  <script type="module" src="butter://main.ts"></script>
</body>
</html>
